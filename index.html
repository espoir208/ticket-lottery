<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>発券シミュレーター</title>
<style>
body{
    font-family:sans-serif;
    text-align:center;
    padding:30px;
}

#seat{
    font-size:32px;
    font-weight:bold;
    margin:20px;
}

button{
    font-size:24px;
    padding:10px 30px;
}

#history{
    margin-top:30px;
}
</style>
</head>
<body>

<h1>Runway@大阪城ホール 発券シミュレーター</h1>

<button onclick="drawSeat()">発券</button>

<div id="seat">---</div>


<h2>アリーナ座席表</h2>
<img src="arena.jpg" style="max-width:100%;">

<h2>スタンド座席表</h2>
<img src="stand.jpg" style="max-width:100%;">


    
<h2>履歴</h2>
<div id="history"></div>

<script>
let seats = [];
let history = [];

fetch("seats.csv")
.then(response => response.text())
.then(text => {
    seats = text
        .split(/\r?\n/)
        .slice(1)
        .filter(x => x.trim());
});

function drawSeat(){

    const seat =
        seats[Math.floor(Math.random() * seats.length)];

    document.getElementById("seat").textContent = seat;

    history.unshift(seat);

    if(history.length > 10){
        history.pop();
    }

    document.getElementById("history").innerHTML =
        history.join("<br>");
}
</script>

</body>
</html>
